name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-recipes-ecs:
    name: Deploy recipes to ECS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      ECS_CLUSTER: default
      ECS_SERVICE: jd-recipes-5b7e
      ECR_REGISTRY: 537378840914.dkr.ecr.us-west-2.amazonaws.com
      ECR_REPOSITORY: jd-recipes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f apps/recipes/Dockerfile \
            -t "$IMAGE_URI" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy new task definition revision
        run: |
          set -euo pipefail

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          if [[ -z "$TASK_DEF_ARN" || "$TASK_DEF_ARN" == "None" || "$TASK_DEF_ARN" == "null" ]]; then
            TASK_ARN=$(aws ecs list-tasks \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --desired-status RUNNING \
              --query 'taskArns[0]' \
              --output text)

            if [[ -n "$TASK_ARN" && "$TASK_ARN" != "None" && "$TASK_ARN" != "null" ]]; then
              TASK_DEF_ARN=$(aws ecs describe-tasks \
                --cluster "$ECS_CLUSTER" \
                --tasks "$TASK_ARN" \
                --query 'tasks[0].taskDefinitionArn' \
                --output text)
            fi
          fi

          if [[ -z "$TASK_DEF_ARN" || "$TASK_DEF_ARN" == "None" || "$TASK_DEF_ARN" == "null" ]]; then
            echo "Failed to resolve task definition ARN for service $ECS_SERVICE in cluster $ECS_CLUSTER"
            exit 1
          fi

          echo "Resolved task definition: $TASK_DEF_ARN"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' > task-definition.json

          jq --arg IMAGE_URI "$IMAGE_URI" '
            .containerDefinitions[0].image = $IMAGE_URI
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' task-definition.json > task-definition-updated.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

  deploy-spk-ec2:
    name: Deploy spk to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy spk to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -se' << 'EOF'
            set -euo pipefail
            cd /srv/jd-recipes/jd-recipes
            sudo systemctl stop jd-spk
            git fetch origin main
            git reset --hard ${{ github.sha }}
            rm -rf node_modules
            rm -rf apps/spk/node_modules
            npm install
            rm -rf apps/spk/.next
            rm -rf packages/ui/dist
            sudo cp /etc/spk.env /tmp/spk.env
            sudo chown $(whoami):$(whoami) /tmp/spk.env
            sudo chmod 600 /tmp/spk.env
            sudo -u $(whoami) bash -lc 'set -o allexport; source /tmp/spk.env; set +o allexport; cd /srv/jd-recipes/jd-recipes && npm run build --workspace @repo/ui && npm run build --workspace spk'
            sudo rm -f /tmp/spk.env
            sudo systemctl start jd-spk
          EOF
