name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /srv/jd-recipes/jd-recipes
            git pull
            rm -rf node_modules
            npm install
            rm -rf apps/recipes/.next
            rm -rf packages/ui/dist
            sudo cp /etc/jd-recipes.env /tmp/jd-recipes.env
            sudo chown $(whoami):$(whoami) /tmp/jd-recipes.env
            sudo chmod 600 /tmp/jd-recipes.env
            sudo -u $(whoami) bash -lc 'set -o allexport; source /tmp/jd-recipes.env; set +o allexport; cd /srv/jd-recipes/jd-recipes && npm run build'
            sudo rm -f /tmp/jd-recipes.env
            sudo systemctl restart jd-recipes
          EOF
